services:
  bibliotecadb:
    image: postgres:16-alpine
    env_file:
      - .env.prod
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8085:3000"
    env_file:
      - .env.prod
    depends_on:
      bibliotecadb:
        condition: service_healthy
    restart: always

volumes:
  postgres_prod_data: