services:
  db:
    image: postgres:16-alpine
    container_name: next-landing-page-db-1
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: payloadcms
    ports:
      - "5433:5432" # Sigue disponible en el 5433 para tus programas externos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payloadcms"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: next-landing-page-frontend-1
    ports:
      - "8085:3000" # <-- Recuerda: Tu Apache debe apuntar al puerto 8085 del host
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy # No arranca el frontend hasta que la DB esté lista
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - WATCHPACK_POLLING=true
      - PAYLOAD_SECRET=9fc076e667cb808e40733d2b
      # CORREGIDO: Se cambia DATABASE_URL por DATABASE_URI que es el estándar de Payload
      - DATABASE_URI=postgres://postgres:1234@db:5432/payloadcms

volumes:
  postgres_data:
  media_data: