services:
  db:
      image: postgres:16-alpine
      container_name: next-landing-page-db-1
      restart: always
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: 1234
        POSTGRES_DB: payloadcms
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data

  frontend:
    build:
      context: .
    ports:
      - "8085:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
    - WATCHPACK_POLLING=true
    - PAYLOAD_SECRET=9fc076e667cb808e40733d2b
    - DATABASE_URL=postgres://postgres:1234@db:5432/payloadcms
    - NEXT_PUBLIC_STRAPI_URL=http://localhost:1337

volumes:
postgres_data: